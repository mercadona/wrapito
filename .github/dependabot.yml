version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "07:00"
    open-pull-requests-limit: 15
    commit-message:
      prefix: chore
      include: scope
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      eslint:
        patterns:
          - "eslint"
          - "@typescript-eslint/*"
          - "eslint-plugin-*"
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest"
          - "jsdom"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "07:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
      include: scope
    groups:
      actions:
        patterns:
          - "*"
